# ─────────────────────────────────────────────────────────────────────────────
# GitHub Actions - Production Deployment to VPS
# ─────────────────────────────────────────────────────────────────────────────

name: Deploy to Production

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  NODE_VERSION: '20'
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ──────────────────────────────────────────────────────────────────────────
  # Job 1: Build and Push Docker Image
  # ──────────────────────────────────────────────────────────────────────────
  build-and-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=sha,prefix=
            latest

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          target: runner

      - name: Image digest
        run: echo "Image pushed: ${{ steps.meta.outputs.tags }}"

  # ──────────────────────────────────────────────────────────────────────────
  # Job 2: Deploy to VPS Server
  # ──────────────────────────────────────────────────────────────────────────
  deploy-to-vps:
    name: Deploy to VPS Server
    runs-on: ubuntu-latest
    needs: [build-and-push]
    environment: production

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup SSH key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.DEPLOY_SSH_KEY }}

      - name: Add server to known hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts

      - name: Deploy to server
        run: |
          ssh -o StrictHostKeyChecking=no ${{ secrets.VPS_USERNAME }}@${{ secrets.VPS_HOST }} << 'ENDSSH'
            set -e
            
            echo "🚀 Starting deployment..."
            echo "📂 Working directory: /var/www/dr-kumar-foundation"
            
            # Navigate to application directory
            cd /var/www/dr-kumar-foundation
            
            # Login to GitHub Container Registry
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            
            # Pull new Docker image
            echo "📦 Pulling latest Docker image..."
            docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            
            # Stop old containers (keep volumes)
            echo "🛑 Stopping old containers..."
            docker-compose down
            
            # Start new containers
            echo "▶️  Starting new containers..."
            docker-compose up -d
            
            # Wait for application to be ready
            echo "⏳ Waiting for application to start..."
            sleep 30
            
            # Check container status
            echo "📊 Container status:"
            docker-compose ps
            
            # Show logs
            echo "📋 Recent logs:"
            docker-compose logs --tail=20 app
            
            # Clean up old images
            echo "🧹 Cleaning up old images..."
            docker image prune -f
            
            # Logout from registry
            docker logout ghcr.io
            
            echo "✅ Deployment completed successfully!"
            echo "🌐 Application URL: http://${{ secrets.VPS_HOST }}:3000"
          ENDSSH

      - name: Health check
        run: |
          echo "⏳ Waiting for application to be ready..."
          sleep 30
          
          # Try health check (may fail if firewall blocks external access)
          curl -f http://${{ secrets.VPS_HOST }}:3000/api/health || echo "⚠️ Health check skipped (firewall may block external access)"

      - name: Deployment summary
        run: |
          echo "## 🎉 Deployment Summary"
          echo ""
          echo "**Repository:** ${{ github.repository }}"
          echo "**Branch:** ${{ github.ref_name }}"
          echo "**Commit:** ${{ github.sha }}"
          echo "**Triggered by:** ${{ github.actor }}"
          echo "**Deployed to:** ${{ secrets.VPS_HOST }}"
          echo "**Docker Image:** ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest"
          echo ""
          echo "✅ Deployment completed!"
