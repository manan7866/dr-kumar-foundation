# # ──────────────────────────────────────────────────────────────────────────
# # Volumes
# # ──────────────────────────────────────────────────────────────────────────
# volumes:
#   postgres-data:
#     driver: local

# # ──────────────────────────────────────────────────────────────────────────
# # Networks
# # ──────────────────────────────────────────────────────────────────────────
# networks:
#   dr-kumar-network:
#     driver: bridge
services:
  # ──────────────────────────────────────────────────────────────────────────
  # PostgreSQL Database
  # ──────────────────────────────────────────────────────────────────────────
  db:
    image: postgres:15-alpine
    container_name: dr-kumar-db
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - dr-kumar-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ──────────────────────────────────────────────────────────────────────────
  # Database Migration Service (NO BUILD - lightweight)
  # ──────────────────────────────────────────────────────────────────────────
  migrate:
    image: node:20-alpine
    container_name: dr-kumar-migrate
    working_dir: /app
    volumes:
      - ./prisma:/app/prisma
    environment:
      - DATABASE_URL=${DATABASE_URL}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - dr-kumar-network
    command: >
      sh -c "
        npm install -g prisma &&
        echo '⏳ Checking database...' &&
        sleep 3 &&
        if npx prisma db pull > /dev/null 2>&1; then
          echo '✅ Schema already exists, skipping push.'
        else
          echo '📋 Pushing Prisma schema...' &&
          npx prisma db push --accept-data-loss --url $DATABASE_URL &&
          echo '🎉 Schema created!'
        fi
      "
    restart: "no"

  # ──────────────────────────────────────────────────────────────────────────
  # Next.js Application
  # ──────────────────────────────────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - DATABASE_URL=${DATABASE_URL}
        - NEXTAUTH_URL=${NEXTAUTH_URL:-http://localhost:3000}
    container_name: dr-kumar-app
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000             # bind Next.js server to container port
      - HOSTNAME=0.0.0.0
      - DATABASE_URL=${DATABASE_URL}
      - NEXTAUTH_URL=${NEXTAUTH_URL:-http://localhost:3000}
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET}
      - CLOUDINARY_CLOUD_NAME=${CLOUDINARY_CLOUD_NAME}
      - CLOUDINARY_API_KEY=${CLOUDINARY_API_KEY}
      - CLOUDINARY_API_SECRET=${CLOUDINARY_API_SECRET}
      - CLOUDINARY_UPLOAD_FOLDER=${CLOUDINARY_UPLOAD_FOLDER:-dr-kumar-profiles}
      - RESEND_API_KEY=${RESEND_API_KEY}
      - EMAIL_FROM=${EMAIL_FROM}
    depends_on:
      migrate:
        condition: service_completed_successfully
      db:
        condition: service_healthy
    networks:
      - dr-kumar-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

# ──────────────────────────────────────────────────────────────────────────
# Volumes
# ──────────────────────────────────────────────────────────────────────────
volumes:
  postgres-data:
    driver: local

# ──────────────────────────────────────────────────────────────────────────
# Networks
# ──────────────────────────────────────────────────────────────────────────
networks:
  dr-kumar-network:
    driver: bridge